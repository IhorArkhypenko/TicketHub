apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: {{ .Values.namespace }}
data:
  init.sql: |
    {{- range .Values.postgres.databases }}
    CREATE DATABASE {{ . }};
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
  labels: { app: postgres }
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgres.image }}
          ports:
            - containerPort: 5432
          env:
            - { name: POSTGRES_USER, value: {{ .Values.credentials.username | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.credentials.password | quote }} }
            - { name: POSTGRES_DB, value: {{ .Values.credentials.username | quote }} }
          volumeMounts:
            - { name: init, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "{{ .Values.credentials.username }}"] }
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: init
          configMap: { name: postgres-init }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: postgres }
  ports:
    - { port: 5432, targetPort: 5432 }
