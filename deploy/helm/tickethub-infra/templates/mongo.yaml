apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: {{ .Values.namespace }}
  labels: { app: mongo }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mongo }
  template:
    metadata:
      labels: { app: mongo }
    spec:
      containers:
        - name: mongo
          image: {{ .Values.mongo.image }}
          ports:
            - containerPort: 27017
          env:
            - { name: MONGO_INITDB_ROOT_USERNAME, value: {{ .Values.credentials.username | quote }} }
            - { name: MONGO_INITDB_ROOT_PASSWORD, value: {{ .Values.credentials.password | quote }} }
          readinessProbe:
            exec: { command: ["mongosh", "--quiet", "--eval", "db.adminCommand('ping')"] }
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: mongo }
  ports:
    - { port: 27017, targetPort: 27017 }
