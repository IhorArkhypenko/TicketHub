apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: tickethub
  labels: { app: catalog }
spec:
  replicas: 1
  selector:
    matchLabels: { app: catalog }
  template:
    metadata:
      labels: { app: catalog }
    spec:
      containers:
        - name: catalog
          image: tickethub/catalog:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
            - { name: grpc, containerPort: 8081 }
          envFrom:
            - configMapRef: { name: tickethub-config }
            - secretRef: { name: tickethub-secret }
          env:
            - { name: HttpPort, value: "8080" }
            - { name: GrpcPort, value: "8081" }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: catalog
  namespace: tickethub
  labels: { app: catalog }
spec:
  selector: { app: catalog }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
    - { name: grpc, port: 8081, targetPort: 8081 }
