apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tickethub-ingress
  namespace: tickethub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    # External clients enter only through the gateway (host: tickethub.local).
    - host: tickethub.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
