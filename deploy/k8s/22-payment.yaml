apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: tickethub
  labels: { app: payment }
spec:
  replicas: 1
  selector:
    matchLabels: { app: payment }
  template:
    metadata:
      labels: { app: payment }
    spec:
      containers:
        - name: payment
          image: tickethub/payment:latest
          imagePullPolicy: IfNotPresent
          ports:
            - { name: http, containerPort: 8080 }
          envFrom:
            - configMapRef: { name: tickethub-config }
            - secretRef: { name: tickethub-secret }
          readinessProbe:
            httpGet: { path: /health/ready, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health/live, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: tickethub
  labels: { app: payment }
spec:
  selector: { app: payment }
  ports:
    - { name: http, port: 8080, targetPort: 8080 }
