name: tickethub

# Application services. Use together with the infrastructure compose file:
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d --build
# Services attach to the shared "tickethub" network defined in docker-compose.yml.
#
# Inside the cluster the token issuer is http://identity:8080 (IdentityServer IssuerUri),
# and every resource validates against that same authority, so service-to-service auth is
# consistent. Interactive browser PKCE through the published port is a local-dev concern.

services:
  identity:
    build:
      context: ../..
      dockerfile: src/Services/Identity/Identity.Api/Dockerfile
    container_name: tickethub-identity
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__IdentityDb: "Host=postgres;Port=5432;Database=identity;Username=tickethub;Password=tickethub"
      IdentityServer__IssuerUri: http://identity:8080
      Observability__Loki__Endpoint: http://loki:3100
      Observability__Otlp__Endpoint: http://tempo:4317
    ports:
      - "5102:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [tickethub]

  catalog:
    build:
      context: ../..
      dockerfile: src/Services/Catalog/Catalog.Api/Dockerfile
    container_name: tickethub-catalog
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      HttpPort: "8080"
      GrpcPort: "8081"
      ConnectionStrings__CatalogDb: "Host=postgres;Port=5432;Database=catalog;Username=tickethub;Password=tickethub"
      ConnectionStrings__Redis: "redis:6379"
      Identity__Authority: http://identity:8080
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: tickethub
      RabbitMq__Password: tickethub
      Observability__Loki__Endpoint: http://loki:3100
      Observability__Otlp__Endpoint: http://tempo:4317
    ports:
      - "5101:8080"
      - "5111:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity:
        condition: service_started
    networks: [tickethub]

  payment:
    build:
      context: ../..
      dockerfile: src/Services/Payment/Payment.Api/Dockerfile
    container_name: tickethub-payment
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__PaymentDb: "Host=postgres;Port=5432;Database=payment;Username=tickethub;Password=tickethub"
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: tickethub
      RabbitMq__Password: tickethub
      Observability__Loki__Endpoint: http://loki:3100
      Observability__Otlp__Endpoint: http://tempo:4317
    ports:
      - "5103:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [tickethub]

  booking:
    build:
      context: ../..
      dockerfile: src/Services/Booking/Booking.Api/Dockerfile
    container_name: tickethub-booking
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__BookingDb: "Host=postgres;Port=5432;Database=booking;Username=tickethub;Password=tickethub"
      Identity__Authority: http://identity:8080
      Catalog__GrpcAddress: http://catalog:8081
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: tickethub
      RabbitMq__Password: tickethub
      Booking__HoldTimeoutSeconds: "120"
      Observability__Loki__Endpoint: http://loki:3100
      Observability__Otlp__Endpoint: http://tempo:4317
    ports:
      - "5104:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog:
        condition: service_started
      identity:
        condition: service_started
    networks: [tickethub]

  notifications:
    build:
      context: ../..
      dockerfile: src/Services/Notifications/Notifications.Api/Dockerfile
    container_name: tickethub-notifications
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Mongo: "mongodb://tickethub:tickethub@mongo:27017/?authSource=admin"
      Mongo__Database: notifications
      RabbitMq__Host: rabbitmq
      RabbitMq__Username: tickethub
      RabbitMq__Password: tickethub
      Observability__Loki__Endpoint: http://loki:3100
      Observability__Otlp__Endpoint: http://tempo:4317
    ports:
      - "5105:8080"
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks: [tickethub]

  gateway:
    build:
      context: ../..
      dockerfile: src/Services/Gateway/Gateway/Dockerfile
    container_name: tickethub-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Identity__Authority: http://identity:8080
      ReverseProxy__Clusters__catalog__Destinations__primary__Address: http://catalog:8080/
      ReverseProxy__Clusters__booking__Destinations__primary__Address: http://booking:8080/
      Observability__Loki__Endpoint: http://loki:3100
      Observability__Otlp__Endpoint: http://tempo:4317
    ports:
      - "8080:8080"
    depends_on:
      catalog:
        condition: service_started
      booking:
        condition: service_started
      identity:
        condition: service_started
    networks: [tickethub]

networks:
  tickethub:
    external: true
    name: tickethub
