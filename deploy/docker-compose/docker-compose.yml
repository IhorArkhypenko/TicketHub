name: tickethub

# Shared infrastructure for local development: databases, broker and the
# observability stack (Prometheus, Grafana, Loki, Tempo).
# Application services live in docker-compose.apps.yml.

services:
  postgres:
    image: postgres:16-alpine
    container_name: tickethub-postgres
    environment:
      POSTGRES_USER: tickethub
      POSTGRES_PASSWORD: tickethub
      POSTGRES_DB: tickethub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./config/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickethub"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [tickethub]

  mongo:
    image: mongo:7
    container_name: tickethub-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: tickethub
      MONGO_INITDB_ROOT_PASSWORD: tickethub
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tickethub]

  redis:
    image: redis:7-alpine
    container_name: tickethub-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [tickethub]

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: tickethub-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: tickethub
      RABBITMQ_DEFAULT_PASS: tickethub
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [tickethub]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: tickethub-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=6h"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks: [tickethub]

  loki:
    image: grafana/loki:3.1.1
    container_name: tickethub-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    networks: [tickethub]

  tempo:
    image: grafana/tempo:2.6.0
    container_name: tickethub-tempo
    command: ["-config.file=/etc/tempo/tempo.yml"]
    ports:
      - "3200:3200"   # tempo query
      - "4317:4317"   # otlp grpc
      - "4318:4318"   # otlp http
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro
    networks: [tickethub]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: tickethub-grafana
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on: [prometheus, loki, tempo]
    networks: [tickethub]

volumes:
  postgres-data:
  mongo-data:
  redis-data:
  rabbitmq-data:
  grafana-data:

networks:
  tickethub:
    name: tickethub
    driver: bridge
